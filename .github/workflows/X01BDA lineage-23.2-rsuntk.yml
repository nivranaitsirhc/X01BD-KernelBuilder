name: Build X01BD Lineage 23.2 with KSU
on:
  workflow_dispatch:
  
jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Build Kernel
      uses: nivranaitsirhc/Android_Kernel_Builder@continues-changes
      with:
          # Kernel Config
          arch: arm64
          kernel-url: https://github.com/nivranaitsirhc/android_kernel_asus_sdm660-4.19
          kernel-branch: lineage-23.2
          
          # defconfig: vendor/asus/X01BD-KSU_defconfig
          defconfig: vendor/asus/X01BD_defconfig

          use-clang: true
          aosp-clang-android-version: 13
          aosp-clang-version: r450784d
          
          use-custom-clang: false
          clang-url: https://github.com/ZyCromerZ/Clang/releases/download/21.0.0git-20250314-release/Clang-21.0.0git-20250314.tar.gz
          clang-branch: 

          use-gcc: true
          aosp-gcc-android-version: 13

          # Build Config
          use-ccache: true
          show-ccache-stats: true
          # extra-cmd: LD=ld.lld AR=llvm-ar AS=llvm-as NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
          
          # KernelSU Support & others
          use-ksu: true
          ksu-version: main
          ksu-url-setup: https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh
          
          # Extras
          use-anykernel3: true
          
          release: true
          release-name: X01BD-Lineage23.2-KSU
          # use-extended-rel-name: true
          access-token: ${{ secrets.GHT }}
